name: Build LLVM to Aliyun

on:
  push:
    # 监听这两个分支的推送
    branches:
      - "devtoolset"
    paths:
    #   - "x-tools/base/**"
    #   - "x-tools/Dockerfile-llvm"
      - ".github/workflows/build-xtools-llvm.yml"
  workflow_dispatch:

jobs:

  prepare-source:
    runs-on: ubuntu-latest
    outputs:
      llvm_version: ${{ steps.get_version.outputs.llvm_version }}
    steps:
      - uses: actions/checkout@v5
      - name: Load version into env
        id: get_version
        run: |
          VERSION=$(bash ./x-tools/llvm_version.sh)
          echo "LLVM_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "llvm_version=$VERSION" >> "$GITHUB_OUTPUT"
  build-and-push:
    needs:
       - prepare-source
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-latest
            image_tag: llvm-x86_64-${{ needs.prepare-source.outputs.llvm_version }}
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
            image_tag: llvm-aarch64-${{ needs.prepare-source.outputs.llvm_version }}
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
      - name: Show runner arch
        run: |
          uname -a
          arch
      - name: Login to Aliyun Registry
        run: |
          echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login \
            registry.cn-hangzhou.aliyuncs.com \
            -u "${{ secrets.ALIYUN_USERNAME }}" \
            --password-stdin
      - name: Build image
        run: |
          IMAGE_NAME=registry.cn-hangzhou.aliyuncs.com/zarra/centos:${{ matrix.image_tag }}
          docker build \
            --ulimit nofile=8192:8192 \
            -t ${IMAGE_NAME} \
            -f ./x-tools/Dockerfile-llvm ./x-tools
      - name: Push image
        run: |
          IMAGE_NAME=registry.cn-hangzhou.aliyuncs.com/zarra/centos:${{ matrix.image_tag }}
          docker push ${IMAGE_NAME}
  merge-manifest:
    name: Merge multi-arch image
    runs-on: ubuntu-latest
    needs: 
        - build-and-push
        - prepare-source
    steps:
      - name: Login to Aliyun Registry
        run: |
          echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login \
            registry.cn-hangzhou.aliyuncs.com \
            -u "${{ secrets.ALIYUN_USERNAME }}" \
            --password-stdin
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Create and push manifest
        run: |
          TARGET=registry.cn-hangzhou.aliyuncs.com/zarra/centos:llvm-${{ needs.prepare-source.outputs.llvm_version }}
          AMD64=registry.cn-hangzhou.aliyuncs.com/zarra/centos:llvm-x86_64-${{ needs.prepare-source.outputs.llvm_version }}
          ARM64=registry.cn-hangzhou.aliyuncs.com/zarra/centos:llvm-aarch64-${{ needs.prepare-source.outputs.llvm_version }}
          docker buildx imagetools create \
            -t ${TARGET} \
            ${AMD64} \
            ${ARM64}
      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            registry.cn-hangzhou.aliyuncs.com/zarra/centos:llvm-${{ needs.prepare-source.outputs.llvm_version }}

    