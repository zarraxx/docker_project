name: Build and Push XTools base to Aliyun

# on:
#   push:
#     # 监听这两个分支的推送
#     branches:
#       - "devtoolset"
#     # 只有当 x-tools 目录下的文件或 Dockerfile 变化时才触发（可选，更节省资源）
#     paths:
#       - "x-tools/base/**"
#       - "x-tools/Dockerfile-xtools-base"
#       - ".github/workflows/build-xtools-base.yml"
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
jobs:
  build-and-push:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-latest
            image_tag: x-tools-base_x86_64
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
            image_tag: x-tools-base_aarch64
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
      - name: Show runner arch
        run: |
          uname -a
          arch
      - name: Login to Aliyun Registry
        run: |
          echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login \
            registry.cn-hangzhou.aliyuncs.com \
            -u "${{ secrets.ALIYUN_USERNAME }}" \
            --password-stdin
      - name: Build image
        run: |
          IMAGE_NAME=registry.cn-hangzhou.aliyuncs.com/zarra/centos:${{ matrix.image_tag }}
          docker build \
            --ulimit nofile=8192:8192 \
            -t ${IMAGE_NAME} \
            -f ./x-tools/Dockerfile-xtools-base ./x-tools
      - name: Push image
        run: |
          IMAGE_NAME=registry.cn-hangzhou.aliyuncs.com/zarra/centos:${{ matrix.image_tag }}
          docker push ${IMAGE_NAME}
  merge-manifest:
    name: Merge multi-arch image
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Login to Aliyun Registry
        run: |
          echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login \
            registry.cn-hangzhou.aliyuncs.com \
            -u "${{ secrets.ALIYUN_USERNAME }}" \
            --password-stdin
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Create and push manifest
        run: |
          TARGET=registry.cn-hangzhou.aliyuncs.com/zarra/centos:x-tools-base
          AMD64=registry.cn-hangzhou.aliyuncs.com/zarra/centos:x-tools-base_x86_64
          ARM64=registry.cn-hangzhou.aliyuncs.com/zarra/centos:x-tools-base_aarch64
          docker buildx imagetools create \
            -t ${TARGET} \
            ${AMD64} \
            ${ARM64}
      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            registry.cn-hangzhou.aliyuncs.com/zarra/centos:x-tools-base
